config:
  # icon shown when no definition is found for the running program
  fallback-icon: "?"
  # icon shown when a window has multiple panes
  multi-pane-icon: "\uebc7"
  # show the window name alongside the icon
  show-name: true
  # show the icon to the "left" or "right" of the window name
  icon-position: "left"

# Most icons are defined in defaults.yml (bash, nvim, lazygit, zsh, etc.)
# Add overrides or new entries below.
icons:
  zsh: ""
  bash: ""
